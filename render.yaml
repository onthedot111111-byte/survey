services:
  - type: web
    name: survey-share-proof
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: SURVEY_URL
        sync: false
      - key: MAX_UPLOAD_MB
        value: "8"
